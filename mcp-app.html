<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Charts</title>
    <style>
      :root {
        color-scheme: light dark;
        --safe-area-top: 0px;
        --safe-area-right: 0px;
        --safe-area-bottom: 0px;
        --safe-area-left: 0px;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
      }

      body {
        display: grid;
        place-items: center;
        padding:
          calc(20px + var(--safe-area-top))
          calc(20px + var(--safe-area-right))
          calc(20px + var(--safe-area-bottom))
          calc(20px + var(--safe-area-left));
        box-sizing: border-box;
        background:
          radial-gradient(
            120% 90% at 0% 0%,
            color-mix(in srgb, var(--color-accent-primary, #0284c7) 14%, transparent),
            transparent 52%
          ),
          radial-gradient(
            90% 80% at 100% 100%,
            color-mix(in srgb, var(--color-accent-primary, #0284c7) 10%, transparent),
            transparent 64%
          ),
          var(--color-background-primary, #ffffff);
      }

      #sandbox-card {
        width: min(92vw, 760px);
        border-radius: 20px;
        border: 1px solid color-mix(in srgb, var(--color-border-default, #94a3b8) 48%, transparent);
        background: color-mix(in srgb, var(--color-background-secondary, #ffffff) 93%, transparent);
        backdrop-filter: blur(8px);
        box-shadow:
          0 24px 42px color-mix(in srgb, #020617 16%, transparent),
          inset 0 1px 0 color-mix(in srgb, #ffffff 36%, transparent);
        padding: 18px;
        box-sizing: border-box;
      }

      #chart-header {
        margin-bottom: 14px;
      }

      #chart-title {
        margin: 0;
        font: 600 18px/1.15 var(--font-sans, "Avenir Next", "Segoe UI", sans-serif);
        color: var(--color-text-primary, #0f172a);
      }

      #chart-total {
        margin: 5px 0 0;
        font: 500 13px/1.3 var(--font-sans, "Avenir Next", "Segoe UI", sans-serif);
        color: color-mix(in srgb, var(--color-text-secondary, #334155) 90%, transparent);
        letter-spacing: 0.01em;
      }

      #chart-layout {
        display: grid;
        grid-template-columns: minmax(220px, 320px) minmax(200px, 1fr);
        align-items: center;
        gap: 18px;
      }

      #chart {
        width: 100%;
      }

      #chart svg {
        width: 100%;
        height: 100%;
        display: block;
      }

      #chart.chart--pie {
        aspect-ratio: 1;
      }

      #chart.chart--funnel {
        height: min(66vh, 560px);
      }

      .slice {
        cursor: pointer;
        opacity: 0.9;
        stroke: color-mix(in srgb, var(--color-background-secondary, #ffffff) 80%, transparent);
        stroke-width: 1.2;
        transition: opacity 140ms ease, stroke-width 140ms ease;
      }

      .slice:hover,
      .slice:focus-visible,
      .slice.is-active {
        opacity: 1;
        stroke-width: 2.8;
        outline: none;
      }

      .funnel-segment {
        cursor: pointer;
        opacity: 0.92;
        stroke: color-mix(in srgb, var(--color-background-secondary, #ffffff) 78%, transparent);
        stroke-width: 1.4;
        transition: opacity 140ms ease, stroke-width 140ms ease, filter 140ms ease;
      }

      .funnel-segment:hover,
      .funnel-segment:focus-visible,
      .funnel-segment.is-active {
        opacity: 1;
        stroke-width: 2.8;
        filter: saturate(1.03) brightness(1.02);
        outline: none;
      }

      #legend {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 8px;
      }

      .legend-item {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        align-items: center;
        gap: 10px;
        padding: 9px 10px;
        border-radius: 11px;
        border: 1px solid color-mix(in srgb, var(--color-border-default, #cbd5e1) 55%, transparent);
        background: color-mix(in srgb, var(--color-background-primary, #ffffff) 86%, transparent);
        color: var(--color-text-primary, #0f172a);
        font: 500 13px/1.2 var(--font-sans, "Avenir Next", "Segoe UI", sans-serif);
        transition:
          border-color 120ms ease,
          background-color 120ms ease,
          transform 120ms ease,
          box-shadow 120ms ease;
        outline: none;
      }

      .legend-item:hover,
      .legend-item:focus-visible,
      .legend-item.is-active {
        border-color: color-mix(in srgb, var(--color-accent-primary, #0284c7) 48%, var(--color-border-default, #cbd5e1));
        background: color-mix(in srgb, var(--color-accent-primary, #0284c7) 16%, var(--color-background-primary, #ffffff));
        transform: translateY(-1px);
        box-shadow: 0 6px 16px color-mix(in srgb, #0f172a 12%, transparent);
      }

      .legend-swatch {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }

      .legend-label {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .legend-value {
        font-size: 12px;
        color: color-mix(in srgb, var(--color-text-secondary, #475569) 88%, transparent);
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.01em;
      }

      #tooltip {
        position: fixed;
        z-index: 1000;
        pointer-events: none;
        background: color-mix(in srgb, var(--color-background-secondary, #111827) 92%, transparent);
        color: var(--color-text-primary, #f8fafc);
        border: 1px solid color-mix(in srgb, var(--color-border-default, #94a3b8) 65%, transparent);
        border-radius: 8px;
        padding: 6px 8px;
        font: 12px/1.3 var(--font-sans, ui-sans-serif, system-ui, sans-serif);
        white-space: nowrap;
        box-shadow: 0 8px 20px rgba(15, 23, 42, 0.2);
      }

      #tooltip[hidden] {
        display: none;
      }

      @media (max-width: 700px) {
        body {
          padding:
            calc(14px + var(--safe-area-top))
            calc(14px + var(--safe-area-right))
            calc(14px + var(--safe-area-bottom))
            calc(14px + var(--safe-area-left));
        }

        #sandbox-card {
          border-radius: 16px;
          padding: 14px;
        }

        #chart-layout {
          grid-template-columns: 1fr;
          gap: 12px;
        }

        #chart {
          width: min(76vw, 300px);
          margin: 0 auto;
        }

        #chart.chart--funnel {
          width: min(86vw, 320px);
          height: min(60vh, 500px);
        }
      }
    </style>
  </head>
  <body>
    <main id="sandbox-card" aria-label="Chart sandbox container">
      <header id="chart-header">
        <h1 id="chart-title">Charts</h1>
        <p id="chart-total"></p>
      </header>
      <section id="chart-layout">
        <div id="chart" class="chart--pie" aria-label="Interactive chart"></div>
        <ul id="legend" aria-label="Chart legend"></ul>
      </section>
    </main>
    <div id="tooltip" hidden></div>
    <script type="module" src="/src/mcp-app.ts"></script>
  </body>
</html>
