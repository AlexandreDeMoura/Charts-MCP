<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Charts</title>
    <style>
      :root {
        color-scheme: light dark;
        --safe-area-top: 0px;
        --safe-area-right: 0px;
        --safe-area-bottom: 0px;
        --safe-area-left: 0px;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
      }

      body {
        display: grid;
        place-items: center;
        padding:
          calc(20px + var(--safe-area-top))
          calc(20px + var(--safe-area-right))
          calc(20px + var(--safe-area-bottom))
          calc(20px + var(--safe-area-left));
        box-sizing: border-box;
        background:
          radial-gradient(
            120% 90% at 0% 0%,
            color-mix(in srgb, var(--color-accent-primary, #0284c7) 14%, transparent),
            transparent 52%
          ),
          radial-gradient(
            90% 80% at 100% 100%,
            color-mix(in srgb, var(--color-accent-primary, #0284c7) 10%, transparent),
            transparent 64%
          ),
          var(--color-background-primary, #ffffff);
      }

      #sandbox-card {
        width: min(92vw, 760px);
        border-radius: 20px;
        border: 1px solid color-mix(in srgb, var(--color-border-default, #94a3b8) 48%, transparent);
        background: color-mix(in srgb, var(--color-background-secondary, #ffffff) 93%, transparent);
        backdrop-filter: blur(8px);
        box-shadow:
          0 24px 42px color-mix(in srgb, #020617 16%, transparent),
          inset 0 1px 0 color-mix(in srgb, #ffffff 36%, transparent);
        padding: 18px;
        box-sizing: border-box;
      }

      #chart-header {
        margin-bottom: 14px;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      #chart-heading {
        min-width: 0;
      }

      #chart-title {
        margin: 0;
        font: 600 18px/1.15 var(--font-sans, "Avenir Next", "Segoe UI", sans-serif);
        color: var(--color-text-primary, #0f172a);
      }

      #chart-total {
        margin: 5px 0 0;
        font: 500 13px/1.3 var(--font-sans, "Avenir Next", "Segoe UI", sans-serif);
        color: color-mix(in srgb, var(--color-text-secondary, #334155) 90%, transparent);
        letter-spacing: 0.01em;
      }

      #chart-actions {
        position: relative;
        display: grid;
        justify-items: end;
        gap: 6px;
        flex-shrink: 0;
      }

      #export-trigger {
        border: 1px solid color-mix(in srgb, var(--color-border-default, #cbd5e1) 75%, transparent);
        background: color-mix(in srgb, var(--color-background-primary, #ffffff) 90%, transparent);
        color: var(--color-text-primary, #0f172a);
        border-radius: 10px;
        padding: 7px 12px;
        font: 600 12px/1.2 var(--font-sans, "Avenir Next", "Segoe UI", sans-serif);
        letter-spacing: 0.01em;
        cursor: pointer;
        transition: border-color 120ms ease, background-color 120ms ease, transform 120ms ease;
      }

      #export-trigger:hover:not(:disabled),
      #export-trigger:focus-visible:not(:disabled) {
        border-color: color-mix(
          in srgb,
          var(--color-accent-primary, #0284c7) 48%,
          var(--color-border-default, #cbd5e1)
        );
        background: color-mix(in srgb, var(--color-accent-primary, #0284c7) 14%, var(--color-background-primary, #ffffff));
        transform: translateY(-1px);
        outline: none;
      }

      #export-trigger:disabled {
        opacity: 0.48;
        cursor: not-allowed;
      }

      #export-menu {
        position: absolute;
        right: 0;
        top: calc(100% + 4px);
        min-width: 168px;
        border-radius: 12px;
        border: 1px solid color-mix(in srgb, var(--color-border-default, #cbd5e1) 72%, transparent);
        background: color-mix(in srgb, var(--color-background-secondary, #ffffff) 96%, transparent);
        box-shadow: 0 16px 24px color-mix(in srgb, #0f172a 20%, transparent);
        padding: 6px;
        display: grid;
        gap: 4px;
        z-index: 30;
      }

      #export-menu[hidden] {
        display: none;
      }

      .export-menu-item {
        border: 0;
        background: transparent;
        color: var(--color-text-primary, #0f172a);
        text-align: left;
        font: 500 12px/1.25 var(--font-sans, "Avenir Next", "Segoe UI", sans-serif);
        border-radius: 8px;
        padding: 8px 10px;
        cursor: pointer;
      }

      .export-menu-item:hover,
      .export-menu-item:focus-visible {
        background: color-mix(in srgb, var(--color-accent-primary, #0284c7) 14%, var(--color-background-primary, #ffffff));
        outline: none;
      }

      #export-status {
        margin: 0;
        text-align: right;
        font: 500 11px/1.25 var(--font-sans, "Avenir Next", "Segoe UI", sans-serif);
        color: color-mix(in srgb, var(--color-text-secondary, #475569) 90%, transparent);
        max-width: 240px;
      }

      #export-status[data-state="error"] {
        color: color-mix(in srgb, var(--color-text-danger, #b91c1c) 94%, transparent);
      }

      #export-status[hidden] {
        display: none;
      }

      #chart-layout {
        display: grid;
        grid-template-columns: minmax(260px, 1fr) minmax(200px, 240px);
        align-items: center;
        gap: 18px;
      }

      #chart {
        width: 100%;
      }

      #chart svg {
        width: 100%;
        height: 100%;
        display: block;
      }

      #chart.chart--pie {
        aspect-ratio: 1;
      }

      #chart.chart--funnel {
        height: min(66vh, 560px);
      }

      #chart.chart--distribution {
        aspect-ratio: 1.5;
      }

      #chart.chart--time-series {
        aspect-ratio: 1.68;
      }

      .slice {
        cursor: pointer;
        opacity: 0.9;
        stroke: color-mix(in srgb, var(--color-background-secondary, #ffffff) 80%, transparent);
        stroke-width: 1.2;
        transition: opacity 140ms ease, stroke-width 140ms ease;
      }

      .slice:hover,
      .slice:focus-visible,
      .slice.is-active {
        opacity: 1;
        stroke-width: 2.8;
        outline: none;
      }

      .funnel-segment {
        cursor: pointer;
        opacity: 0.92;
        stroke: color-mix(in srgb, var(--color-background-secondary, #ffffff) 78%, transparent);
        stroke-width: 1.4;
        transition: opacity 140ms ease, stroke-width 140ms ease, filter 140ms ease;
      }

      .funnel-segment:hover,
      .funnel-segment:focus-visible,
      .funnel-segment.is-active {
        opacity: 1;
        stroke-width: 2.8;
        filter: saturate(1.03) brightness(1.02);
        outline: none;
      }

      .distribution-grid-line {
        stroke: color-mix(in srgb, var(--color-border-default, #64748b) 32%, transparent);
        stroke-width: 1;
      }

      .distribution-axis-line {
        stroke: color-mix(in srgb, var(--color-border-default, #64748b) 65%, transparent);
        stroke-width: 1.2;
      }

      .distribution-axis-label,
      .distribution-x-label {
        fill: color-mix(in srgb, var(--color-text-secondary, #475569) 90%, transparent);
        font: 500 12px/1.1 var(--font-sans, "Avenir Next", "Segoe UI", sans-serif);
        letter-spacing: 0.01em;
      }

      .distribution-bar {
        cursor: pointer;
        opacity: 0.9;
        stroke: color-mix(in srgb, var(--color-background-secondary, #ffffff) 74%, transparent);
        stroke-width: 1.2;
        transition: opacity 140ms ease, stroke-width 140ms ease, filter 140ms ease;
      }

      .distribution-bar:hover,
      .distribution-bar:focus-visible,
      .distribution-bar.is-active {
        opacity: 1;
        stroke-width: 2.4;
        filter: saturate(1.06) brightness(1.04);
        outline: none;
      }

      .time-series-grid-line {
        stroke: color-mix(in srgb, var(--color-border-default, #64748b) 30%, transparent);
        stroke-width: 1;
      }

      .time-series-axis-line {
        stroke: color-mix(in srgb, var(--color-border-default, #64748b) 58%, transparent);
        stroke-width: 1.2;
      }

      .time-series-axis-label,
      .time-series-axis-title,
      .time-series-x-label {
        fill: color-mix(in srgb, var(--color-text-secondary, #475569) 92%, transparent);
        font: 500 12px/1.15 var(--font-sans, "Avenir Next", "Segoe UI", sans-serif);
        letter-spacing: 0.01em;
      }

      .time-series-axis-title {
        font-size: 13px;
      }

      .time-series-series {
        opacity: 0.96;
        transition: opacity 140ms ease;
      }

      .time-series-series.is-muted {
        opacity: 0.28;
      }

      .time-series-area {
        opacity: 0.14;
        pointer-events: none;
      }

      .time-series-line {
        fill: none;
        stroke-width: 3.2;
        stroke-linecap: round;
        stroke-linejoin: round;
        cursor: pointer;
        transition: stroke-width 140ms ease, filter 140ms ease;
      }

      .time-series-line--dashed {
        stroke-dasharray: 10 8;
      }

      .time-series-series.is-active .time-series-line {
        stroke-width: 4;
        filter: saturate(1.08) brightness(1.05);
      }

      .time-series-point {
        cursor: pointer;
        stroke: color-mix(in srgb, var(--color-background-secondary, #ffffff) 72%, transparent);
        stroke-width: 1.8;
        transition: r 140ms ease, stroke-width 140ms ease, filter 140ms ease;
      }

      .time-series-point.is-annotated {
        stroke-width: 2.4;
      }

      .time-series-series.is-active .time-series-point {
        filter: saturate(1.12) brightness(1.08);
      }

      .time-series-annotation-ring {
        fill: none;
        stroke-width: 1.6;
        opacity: 0.82;
        pointer-events: none;
      }

      #legend {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 8px;
      }

      .legend-item {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        align-items: center;
        gap: 10px;
        padding: 9px 10px;
        border-radius: 11px;
        border: 1px solid color-mix(in srgb, var(--color-border-default, #cbd5e1) 55%, transparent);
        background: color-mix(in srgb, var(--color-background-primary, #ffffff) 86%, transparent);
        color: var(--color-text-primary, #0f172a);
        font: 500 13px/1.2 var(--font-sans, "Avenir Next", "Segoe UI", sans-serif);
        transition:
          border-color 120ms ease,
          background-color 120ms ease,
          transform 120ms ease,
          box-shadow 120ms ease;
        outline: none;
      }

      .legend-item:hover,
      .legend-item:focus-visible,
      .legend-item.is-active {
        border-color: color-mix(in srgb, var(--color-accent-primary, #0284c7) 48%, var(--color-border-default, #cbd5e1));
        background: color-mix(in srgb, var(--color-accent-primary, #0284c7) 16%, var(--color-background-primary, #ffffff));
        transform: translateY(-1px);
        box-shadow: 0 6px 16px color-mix(in srgb, #0f172a 12%, transparent);
      }

      .legend-swatch {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: currentColor;
        color: currentColor;
      }

      .legend-swatch--line {
        width: 22px;
        height: 0;
        border-radius: 999px;
        border-top: 3px solid currentColor;
        background: transparent;
      }

      .legend-swatch--dashed {
        border-top-style: dashed;
      }

      .legend-label {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .legend-value {
        font-size: 12px;
        color: color-mix(in srgb, var(--color-text-secondary, #475569) 88%, transparent);
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.01em;
      }

      #tooltip {
        position: fixed;
        z-index: 1000;
        pointer-events: none;
        background: color-mix(in srgb, var(--color-background-secondary, #111827) 92%, transparent);
        color: var(--color-text-primary, #f8fafc);
        border: 1px solid color-mix(in srgb, var(--color-border-default, #94a3b8) 65%, transparent);
        border-radius: 8px;
        padding: 6px 8px;
        font: 12px/1.3 var(--font-sans, ui-sans-serif, system-ui, sans-serif);
        white-space: nowrap;
        box-shadow: 0 8px 20px rgba(15, 23, 42, 0.2);
      }

      #tooltip[hidden] {
        display: none;
      }

      @media (max-width: 700px) {
        body {
          padding:
            calc(14px + var(--safe-area-top))
            calc(14px + var(--safe-area-right))
            calc(14px + var(--safe-area-bottom))
            calc(14px + var(--safe-area-left));
        }

        #sandbox-card {
          border-radius: 16px;
          padding: 14px;
        }

        #chart-header {
          gap: 10px;
        }

        #chart-layout {
          grid-template-columns: 1fr;
          gap: 12px;
        }

        #chart {
          width: min(76vw, 300px);
          margin: 0 auto;
        }

        #chart.chart--funnel {
          width: min(86vw, 320px);
          height: min(60vh, 500px);
        }

        #chart.chart--distribution {
          width: min(92vw, 520px);
        }

        #chart.chart--time-series {
          width: min(92vw, 560px);
        }
      }
    </style>
  </head>
  <body>
    <main id="sandbox-card" aria-label="Chart sandbox container">
      <header id="chart-header">
        <div id="chart-heading">
          <h1 id="chart-title">Charts</h1>
          <p id="chart-total"></p>
        </div>
        <div id="chart-actions">
          <button
            id="export-trigger"
            type="button"
            aria-haspopup="menu"
            aria-expanded="false"
            aria-controls="export-menu"
            disabled
          >
            Export
          </button>
          <div id="export-menu" role="menu" hidden>
            <button class="export-menu-item" role="menuitem" type="button" data-export-format="svg">
              Export as SVG
            </button>
            <button class="export-menu-item" role="menuitem" type="button" data-export-format="png">
              Export as PNG
            </button>
          </div>
          <p id="export-status" aria-live="polite" hidden></p>
        </div>
      </header>
      <section id="chart-layout">
        <div id="chart" class="chart--pie" aria-label="Interactive chart"></div>
        <ul id="legend" aria-label="Chart legend"></ul>
      </section>
    </main>
    <div id="tooltip" hidden></div>
    <script type="module" src="/src/mcp-app.ts"></script>
  </body>
</html>
